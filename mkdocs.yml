site_name: quickmt-train
site_description: A NMT training library built from scratch with PyTorch.
site_url: https://github.com/quickmt/quickmt-train
repo_url: https://github.com/quickmt/quickmt-train
repo_name: quickmt/quickmt-train

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            heading_level: 2
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_labels: true
            group_by_category: true
            show_root_full_path: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Reference:
      - Training: reference/train.md
      - Checkpoint Averaging: reference/average.md
      - Model Export: reference/export.md
      - Evaluation: reference/evaluate.md
      - Data Filtering: reference/filtering.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
